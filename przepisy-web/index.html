<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Przepisy</title>
  <meta name="description" content="Twoje autorskie przepisy — offline, lokalnie na urządzeniu.">

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#e63c78">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Przepisy">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <nav class="nav" id="nav">
      <div class="nav-brand">
        <img src="icons/icon.svg" alt="" width="28" height="28">
        <span>Przepisy</span>
      </div>
      <button class="nav-item" data-action="tab" data-id="recipes"><span class="nav-ico">📖</span><span>Przepisy</span></button>
      <button class="nav-item" data-action="tab" data-id="pantry"><span class="nav-ico">🥕</span><span>Spiżarnia</span></button>
      <button class="nav-item" data-action="tab" data-id="shopping"><span class="nav-ico">🛒</span><span>Zakupy</span></button>
      <button class="nav-item" data-action="tab" data-id="settings"><span class="nav-ico">⚙️</span><span>Ustawienia</span></button>
    </nav>

    <main id="view"><!-- widok renderowany dynamicznie --></main>

    <div id="modal-root"></div>
    <div id="toast" class="toast" hidden></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
